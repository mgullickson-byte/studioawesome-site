<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Commercial | Studio Awesome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="sa-header">
    <div class="sa-header-inner">
      <a href="index.html" class="sa-logo">
        <img src="assets/logo.png" alt="Studio Awesome" />
      </a>
      <button class="sa-hamburger" id="sa-hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
      <nav class="sa-nav">
        <a href="commercial.html">Commercial</a>
        <a href="adr.html">ADR</a>
        <a href="animation.html">Animation</a>
        <a href="voiceover.html">Voiceover</a>
        <a href="casting.html">Casting</a>
        <a href="people.html">People</a>
        <a href="parking.html">Parking</a>
        <a href="contact.html">Let&apos;s Talk</a>
      </nav>
    </div>
  </header>

  <main id="top" class="sa-main">
    <section id="commercial" class="sa-section">
      <div class="sa-section-header">
        <h2>Commercial</h2>
        <p>VO | Mix | Sound Design</p>
      </div>
      <div id="commercial-videos" class="sa-grid sa-grid-2">
        <div class="sa-panel">
          <div class="sa-video-frame sa-lazy-video" data-vimeo="1171948863">
            <div class="sa-lazy-thumb"></div>
            <button class="sa-lazy-play" aria-label="Play">&#9654;</button>
          </div>
        </div>
        <div class="sa-panel">
          <div class="sa-video-frame sa-lazy-video" data-vimeo="1171948757">
            <div class="sa-lazy-thumb"></div>
            <button class="sa-lazy-play" aria-label="Play">&#9654;</button>
          </div>
        </div>
        <div class="sa-panel">
          <div class="sa-video-frame sa-lazy-video" data-vimeo="1171948615">
            <div class="sa-lazy-thumb"></div>
            <button class="sa-lazy-play" aria-label="Play">&#9654;</button>
          </div>
        </div>
        <div class="sa-panel">
          <div class="sa-video-frame sa-lazy-video" data-vimeo="1171948564">
            <div class="sa-lazy-thumb"></div>
            <button class="sa-lazy-play" aria-label="Play">&#9654;</button>
          </div>
        </div>
      </div>
      <div class="sa-show-toggle-row">
        <button type="button" class="sa-show-toggle" data-target="commercial-videos">+ Show more</button>
      </div>
    </section>
  </main>

  <footer class="sa-footer">
    <p>© <span id="year"></span> Studio Awesome. All rights reserved.</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Show/hide toggle
    document.querySelectorAll('.sa-show-toggle').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var targetId = btn.getAttribute('data-target');
        var grid = document.getElementById(targetId);
        if (!grid) return;
        var expanded = grid.classList.toggle('sa-expanded');
        btn.textContent = expanded ? '− Show less' : '+ Show more';
      });
    });

    // Load Vimeo thumbnails
    document.querySelectorAll('.sa-lazy-video').forEach(function(wrap) {
      var id = wrap.getAttribute('data-vimeo');
      var thumb = wrap.querySelector('.sa-lazy-thumb');
      fetch('https://vimeo.com/api/oembed.json?url=https://vimeo.com/' + id)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.thumbnail_url) {
            thumb.style.backgroundImage = 'url(' + data.thumbnail_url + ')';
          }
        });
    });

    // Tap to load and play (iOS-safe: iframe created inside user gesture)
    document.querySelectorAll('.sa-lazy-video').forEach(function(wrap) {
      wrap.addEventListener('click', function() {
        var id = wrap.getAttribute('data-vimeo');
        var iframe = document.createElement('iframe');
        iframe.src = 'https://player.vimeo.com/video/' + id + '?title=0&byline=0&portrait=0&badge=0&autoplay=1';
        iframe.setAttribute('frameborder', '0');
        iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
        iframe.setAttribute('allowfullscreen', '');
        iframe.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border-radius:inherit;';
        // Clear placeholder content and insert iframe
        wrap.innerHTML = '';
        wrap.appendChild(iframe);
      });
    });
  </script>
  <script>
    document.getElementById("sa-hamburger").addEventListener("click", function() {
      document.querySelector(".sa-nav").classList.toggle("sa-nav-open");
    });
  </script>
</body>
</html>
