  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    document.querySelectorAll('.sa-show-toggle').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var targetId = btn.getAttribute('data-target');
        var grid = document.getElementById(targetId);
        if (!grid) return;
        var expanded = grid.classList.toggle('sa-expanded');
        btn.textContent = expanded ? '− Show less' : '+ Show more';
      });
    });

    // Load thumbnails + aspect ratio from Vimeo oembed
    var vimeoData = {};
    document.querySelectorAll('.sa-lazy-video').forEach(function(frame) {
      var id = frame.getAttribute('data-vimeo');
      fetch('https://vimeo.com/api/oembed.json?url=https://vimeo.com/' + id)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          vimeoData[id] = data;
          if (data.thumbnail_url) {
            var thumb = data.thumbnail_url.replace(/_\d+x\d+/, '_1280');
            frame.style.backgroundImage = 'url(' + thumb + ')';
            frame.style.backgroundSize = 'cover';
            frame.style.backgroundPosition = 'center';
          } else {
            frame.style.background = 'linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%)';
          }
          // Fix aspect ratio for non-16:9 videos (e.g. portrait/vertical)
          if (data.width && data.height) {
            frame.style.aspectRatio = data.width + ' / ' + data.height;
          }
        })
        .catch(function() {
          // Private video — show branded gradient placeholder instead of black
          frame.style.background = 'linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%)';
        });
    });

    // Tap to inject iframe (iOS-safe: created synchronously inside user gesture)
    document.querySelectorAll('.sa-lazy-video').forEach(function(frame) {
      frame.addEventListener('click', function() {
        var id = frame.getAttribute('data-vimeo');
        // Clear thumbnail
        frame.style.backgroundImage = '';
        var iframe = document.createElement('iframe');
        iframe.src = 'https://player.vimeo.com/video/' + id + '?title=0&byline=0&portrait=0&badge=0&autoplay=1';
        iframe.setAttribute('frameborder', '0');
        iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
        iframe.setAttribute('allowfullscreen', '');
        frame.innerHTML = '';
        frame.appendChild(iframe);
      });
    });
  </script>
